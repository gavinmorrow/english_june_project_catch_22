<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catch-22</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section class="screen" id="title-screen">
        <h1>Catch-22</h1>
        <button onclick="document.documentElement.requestFullscreen()">
          <img src="catch22.png" alt="" />
        </button>
      </section>
      <section class="screen" id="map">
        <div id="bologna">
          <img src="italy.png" id="map-img" />
          <span id="bologna-pin" class="pin">• Bologna</span>
          <span id="pianosa-pin" class="pin">• Pianosa (base)</span>
          <div id="arrow">→</div>
          <div id="ribbon"></div>
        </div>
        <div id="ribbon-scroll-align"></div>
        <div id="nazis-scroll-align"></div>
        <div id="end-scroll-align"></div>
        <div id="news1-scroll-align"></div>
        <div id="newsmid-scroll-align"></div>
        <div id="news2-scroll-align"></div>
        <div id="newsend-scroll-align"></div>
        <div id="medal-wrapper">
          <!-- from https://www.nationalww2museum.org/war/articles/air-medal-effort-bolster-morale -->
          <img src="medal.png" alt="" />
        </div>
      </section>
      <!-- <section id="smth" class="screen"></section> -->
    </main>
    <div id="bo"></div>
    <div id="news"></div>
    <script type="module" src="script.js"></script>
  </body>
</html>
